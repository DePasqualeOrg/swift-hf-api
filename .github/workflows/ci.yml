name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-macos:
    name: Swift ${{ matrix.swift }} on macOS ${{ matrix.macos }} with Xcode ${{ matrix.xcode }}
    runs-on: macos-${{ matrix.macos }}
    env:
      DEVELOPER_DIR: "/Applications/Xcode_${{ matrix.xcode }}.app/Contents/Developer"
    strategy:
      fail-fast: false
      matrix:
        include:
          - swift: "6.2"
            xcode: "26.0"
            macos: "26"
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build host artifactbundle
        uses: ./.github/actions/build-host-artifactbundle
        with:
          apple: "true"

      - name: Cache Swift Package Manager dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-swift-${{ matrix.swift }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-${{ matrix.swift }}-spm-

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  test-linux:
    name: Swift ${{ matrix.swift-version }} on Linux
    runs-on: ubuntu-latest
    container: "swift:${{ matrix.swift-version }}"
    # Container jobs default `run:` steps to `sh` (dash); force bash so steps
    # using `set -o pipefail` and other bashisms work. The swift image has bash.
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        swift-version:
          - "6.2.3"
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install build prerequisites
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends curl ca-certificates jq build-essential python3 zip

      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          curl -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain none
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build host artifactbundle
        uses: ./.github/actions/build-host-artifactbundle
        with:
          apple: "false"

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  rust-checks:
    name: Rust fmt / clippy / test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: rust
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Read Rust toolchain version
        id: rust-toolchain
        run: |
          version=$(awk -F'"' '/^channel/ {print $2; exit}' ../rust-toolchain.toml)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain (pinned, with rustfmt + clippy)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.version }}
          components: rustfmt, clippy

      - name: Cache cargo registry, git, and target
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

  pin-guards:
    name: Pin / pre-release / Package.swift drift guards
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run source-hash drift guard
        # `rust/Pin.json` is absent until the first Rust artifactbundle
        # release is cut. The pin guards become required once that file
        # lands; before then they have nothing to compare against.
        run: |
          set -euo pipefail
          if [[ ! -f rust/Pin.json ]]; then
              echo "rust/Pin.json does not exist yet; skipping pin guards." \
                "These become required once the first hfapi-rust-* release is cut."
              exit 0
          fi
          bash scripts/rust/release/check-pin.sh

      - name: Run pre-release-pin guard
        # Only runs on PRs targeting main. Pre-release pins (e.g.,
        # 0.4.0-rc.1) are useful on release-prep branches but should never
        # settle on main.
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        run: |
          set -euo pipefail
          if [[ ! -f rust/Pin.json ]]; then
              echo "rust/Pin.json does not exist yet; skipping pre-release guard."
              exit 0
          fi
          bash scripts/rust/release/check-prerelease-pin.sh

      - name: Run Package.swift pin guard
        run: |
          set -euo pipefail
          if [[ ! -f rust/Pin.json ]]; then
              echo "rust/Pin.json does not exist yet; skipping Package.swift pin guard."
              exit 0
          fi
          bash scripts/rust/release/check-package-swift-pin.sh

  wrapper-drift:
    name: UniFFI wrapper drift
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Read Rust toolchain version
        id: rust-toolchain
        run: |
          version=$(awk -F'"' '/^channel/ {print $2; exit}' rust-toolchain.toml)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.version }}

      - name: Cache cargo registry, git, and target
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-wrapper-drift-${{ hashFiles('rust/Cargo.lock', 'rust/Cargo.toml', 'rust/src/**', 'rust/uniffi.toml') }}
          restore-keys: |
            ${{ runner.os }}-wrapper-drift-

      - name: Verify committed UniFFI wrapper matches Rust source
        run: bash scripts/rust/check-wrapper-drift.sh

  verify-docs:
    name: Verify DocC builds clean
    runs-on: macos-26
    env:
      DEVELOPER_DIR: "/Applications/Xcode_26.0.app/Contents/Developer"
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build host artifactbundle
        uses: ./.github/actions/build-host-artifactbundle
        with:
          apple: "true"

      - name: Cache Swift Package Manager dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-swift-6.2-docs-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-6.2-docs-

      - name: Run verify-docs.sh
        run: bash scripts/verify-docs.sh
